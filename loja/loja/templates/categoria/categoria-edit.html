{% extends "base.html" %}
{% load static %}

{% block title %}Editar Categoria{% endblock %}

{% block content %}
<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <h2>Editar Categoria</h2>
            <form method="POST" action="">
                {% csrf_token %}
                <div class="form-group mb-3">
                    <label for="categoria_nome">Nome da Categoria:</label>
                    <input type="text" class="form-control" id="categoria_nome" name="categoria_nome" value="{{ categoria.Categoria }}" required>
                </div>
                <button type="submit" class="btn btn-primary">Atualizar</button>
                <a href="{% url 'categoria' %}" class="btn btn-secondary">Cancelar</a>
            </form>
        </div>
    </div>
</div>
{% endblock %}
