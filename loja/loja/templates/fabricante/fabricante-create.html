{% extends "base.html" %}
{% load static %}

{% block title %}Novo Fabricante{% endblock %}

{% block styles %}
<link rel="stylesheet" href="{% static 'css/home.css' %}">
{% endblock %}

{% block content %}
<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <h2>Cadastrar Novo Fabricante</h2>

            <form method="POST" action="">
                {% csrf_token %}

                <div class="form-group mb-3">
                    <label for="fabricante_nome">Nome do Fabricante:</label>
                    <input
                        type="text"
                        class="form-control"
                        id="fabricante_nome"
                        name="fabricante_nome"
                        required>
                </div>

                <button type="submit" class="btn btn-primary">Salvar</button>
                <a href="{% url 'fabricante' %}" class="btn btn-secondary">Cancelar</a>
            </form>
        </div>
    </div>
</div>
{% endblock %}
